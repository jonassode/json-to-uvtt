<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Map Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4efe1;
        color: #201f1c;
        overflow: hidden;
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        height: 3rem;
        background: #fffaf0;
        border-bottom: 1px solid #c8c0b0;
        flex-shrink: 0;
        position: relative;
        z-index: 100;
      }

      .topbar-title {
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.01em;
      }

      /* Hamburger button */
      .menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 2.2rem;
        height: 2.2rem;
        padding: 0.35rem;
        border: 1px solid #201f1c;
        border-radius: 0.4rem;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
      }

      .menu-btn:hover {
        background: #fef6dd;
      }

      .menu-btn span {
        display: block;
        height: 2px;
        background: #201f1c;
        border-radius: 2px;
      }

      /* Dropdown menu */
      .menu-dropdown {
        display: none;
        position: absolute;
        top: calc(3rem + 2px);
        right: 1rem;
        background: #fffaf0;
        border: 1px solid #c8c0b0;
        border-radius: 0.5rem;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        padding: 0.5rem;
        min-width: 14rem;
        z-index: 200;
      }

      .menu-dropdown.open {
        display: block;
      }

      .menu-item-upload {
        padding: 0.3rem 0.5rem;
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.55rem 0.75rem;
        border-radius: 0.35rem;
        font-size: 0.95rem;
        cursor: pointer;
      }

      .menu-item:hover {
        background: #fef6dd;
      }

      .upload {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 0.9rem;
        border: 1px solid #201f1c;
        border-radius: 0.4rem;
        background: #fffaf0;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        width: 100%;
      }

      .upload:hover {
        background: #fef6dd;
      }

      input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .menu-status {
        margin: 0.35rem 0.75rem 0.2rem;
        font-size: 0.85rem;
        color: #6c675c;
        word-break: break-all;
      }

      .menu-status.error {
        color: #b00020;
      }

      /* ── Map area ── */
      .map-frame {
        flex: 1 1 0;
        background: #ece5d4;
        display: grid;
        place-items: center;
        overflow: auto;
      }

      #map-image {
        max-width: 100%;
        max-height: 100%;
        display: block;
      }

      .placeholder {
        color: #6c675c;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="topbar-title">SVG Map Viewer</span>
      <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="menu-dropdown">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="menu-dropdown" id="menu-dropdown" role="menu">
        <div class="menu-item menu-item-upload">
          <label class="upload" for="svg-upload">Upload SVG Map</label>
          <input id="svg-upload" type="file" accept=".svg,image/svg+xml" />
        </div>
        <p id="status" class="menu-status">Choose an SVG file to render the map.</p>
      </div>
    </header>

    <section class="map-frame" aria-live="polite">
      <p id="placeholder" class="placeholder">No map loaded yet.</p>
      <object id="map-image" type="image/svg+xml" aria-label="Uploaded SVG map" hidden>Your browser does not support SVG maps.</object>
    </section>

    <script>
      const input = document.getElementById('svg-upload');
      const status = document.getElementById('status');
      const image = document.getElementById('map-image');
      const placeholder = document.getElementById('placeholder');
      const menuBtn = document.getElementById('menu-btn');
      const menuDropdown = document.getElementById('menu-dropdown');
      let currentUrl = '';

      // Hamburger toggle
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = menuDropdown.classList.toggle('open');
        menuBtn.setAttribute('aria-expanded', String(isOpen));
        menuBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
      });

      document.addEventListener('click', (e) => {
        if (!menuDropdown.contains(e.target) && !menuBtn.contains(e.target)) {
          menuDropdown.classList.remove('open');
          menuBtn.setAttribute('aria-expanded', 'false');
        }
      });

      const setStatus = (message, isError = false) => {
        status.textContent = message;
        status.classList.toggle('error', isError);
      };

      const revokeCurrentUrl = () => {
        if (currentUrl) {
          URL.revokeObjectURL(currentUrl);
          currentUrl = '';
        }
      };

      const clearImage = () => {
        image.removeAttribute('data');
        image.hidden = true;
        placeholder.hidden = false;
      };

      const sanitizeSvg = (svgDocument) => {
        // ── Security ─────────────────────────────────────────────────────────
        svgDocument.querySelectorAll('script, foreignObject').forEach((node) => node.remove());
        svgDocument.querySelectorAll('*').forEach((node) => {
          [...node.attributes].forEach((attribute) => {
            const name = attribute.name.toLowerCase();
            const value = attribute.value.toLowerCase().trim();
            if (name.startsWith('on') || value.startsWith('javascript:')) {
              node.removeAttribute(attribute.name);
            }
          });
        });

        // ── Helpers ───────────────────────────────────────────────────────────

        // Walk up the ancestor chain to resolve an inherited presentation property.
        const getInherited = (node, prop) => {
          let el = node;
          while (el && el.nodeType === 1) {
            const attr = el.getAttribute(prop);
            if (attr && attr.trim()) return attr.trim();
            const style = el.getAttribute('style') || '';
            const m = style.match(new RegExp(`(?:^|;)\\s*${prop}\\s*:\\s*([^;]+)`, 'i'));
            if (m) return m[1].trim();
            el = el.parentElement;
          }
          return '';
        };

        // Returns true for any dark / near-black colour value.
        const DARK_CHANNEL_MAX = 80;
        const isDark = (color) => {
          if (!color || color === 'none') return false;
          const c = color.trim().toLowerCase();
          if (c === 'black' || c === '#000' || c === '#000000') return true;
          const hex6 = c.match(/^#([0-9a-f]{6})$/);
          if (hex6) {
            const n = parseInt(hex6[1], 16);
            return ((n >> 16) & 0xff) <= DARK_CHANNEL_MAX &&
                   ((n >>  8) & 0xff) <= DARK_CHANNEL_MAX &&
                   ( n        & 0xff) <= DARK_CHANNEL_MAX;
          }
          const hex3 = c.match(/^#([0-9a-f]{3})$/);
          if (hex3) {
            const [r, g, b] = [...hex3[1]].map((ch) => parseInt(ch.repeat(2), 16));
            return r <= DARK_CHANNEL_MAX && g <= DARK_CHANNEL_MAX && b <= DARK_CHANNEL_MAX;
          }
          const rgb = c.match(/^rgba?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
          if (rgb) return +rgb[1] <= DARK_CHANNEL_MAX && +rgb[2] <= DARK_CHANNEL_MAX && +rgb[3] <= DARK_CHANNEL_MAX;
          return false;
        };

        // ── Length measurement via a hidden live-DOM SVG ──────────────────────
        // getTotalLength() on elements inside a DOMParser document (not connected
        // to the page) is unreliable in many browsers – it returns 0 or NaN for
        // <path> elements.  By temporarily parenting a clone into a real (hidden)
        // SVG element we get accurate geometry from the browser's layout engine.
        const measureHost = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        measureHost.style.cssText =
          'position:absolute;visibility:hidden;pointer-events:none;width:0;height:0;overflow:hidden';
        document.body.appendChild(measureHost);

        const measurePathLength = (d) => {
          if (!d) return NaN;
          try {
            const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            p.setAttribute('d', d);
            measureHost.appendChild(p);
            const len = p.getTotalLength();
            measureHost.removeChild(p);
            return Number.isFinite(len) ? len : NaN;
          } catch (_) {
            return NaN;
          }
        };

        const getLength = (node) => {
          const tag = (node.tagName || '').toLowerCase();

          if (tag === 'line') {
            const x1 = parseFloat(node.getAttribute('x1') || '0');
            const y1 = parseFloat(node.getAttribute('y1') || '0');
            const x2 = parseFloat(node.getAttribute('x2') || '0');
            const y2 = parseFloat(node.getAttribute('y2') || '0');
            return Number.isFinite(x1) && Number.isFinite(y1) && Number.isFinite(x2) && Number.isFinite(y2)
              ? Math.hypot(x2 - x1, y2 - y1)
              : NaN;
          }

          if (tag === 'polyline') {
            const pts = (node.getAttribute('points') || '')
              .trim().split(/[\s,]+/).map(Number);
            if (pts.length < 4 || pts.length % 2 !== 0 || !pts.every(Number.isFinite)) return NaN;
            let len = 0;
            for (let i = 2; i < pts.length; i += 2) {
              len += Math.hypot(pts[i] - pts[i - 2], pts[i + 1] - pts[i - 1]);
            }
            return len;
          }

          if (tag === 'path') {
            return measurePathLength(node.getAttribute('d'));
          }

          return NaN;
        };

        // ── Determine the scale-invariant length threshold ────────────────────
        // Use the viewBox diagonal so the threshold adapts to any map coordinate
        // space rather than relying on hard-coded pixel counts.
        // Shadow / edge-hatch marks are typically ≤ 1.5 % of the map diagonal;
        // intentional decorative hatching at the map border is noticeably longer.
        const HATCH_FRACTION = 0.015; // 1.5 % of the viewBox diagonal
        const MAX_STROKE_WIDTH = 3;

        let maxHatchLength = 50; // absolute fallback (px) if viewBox is missing
        const svgRoot = svgDocument.documentElement;
        const vb = svgRoot.getAttribute('viewBox');
        if (vb) {
          const [, , vbW, vbH] = vb.trim().split(/[\s,]+/).map(parseFloat);
          if (Number.isFinite(vbW) && Number.isFinite(vbH) && vbW > 0 && vbH > 0) {
            maxHatchLength = Math.hypot(vbW, vbH) * HATCH_FRACTION;
          }
        }

        // ── Remove artifact hatch lines ───────────────────────────────────────
        try {
          svgDocument.querySelectorAll('line, polyline, path').forEach((node) => {
            const len = getLength(node);
            if (!Number.isFinite(len) || len <= 0 || len > maxHatchLength) return;

            const stroke = getInherited(node, 'stroke');
            const fill   = getInherited(node, 'fill');
            const rawSw  = parseFloat(getInherited(node, 'stroke-width'));
            const sw     = Number.isFinite(rawSw) ? rawSw : 1; // default per SVG spec

            const isHatchStroke = isDark(stroke) && sw > 0 && sw <= MAX_STROKE_WIDTH;
            const isHatchFill   = isDark(fill) && (!stroke || stroke === 'none');

            if (isHatchStroke || isHatchFill) {
              node.remove();
            }
          });
        } finally {
          document.body.removeChild(measureHost);
        }
        return new XMLSerializer().serializeToString(svgDocument);
      };

      input.addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
          return;
        }

        const appearsToBeSvg =
          file.name.toLowerCase().endsWith('.svg') || file.type === 'image/svg+xml';
        if (!appearsToBeSvg) {
          setStatus('Please select a valid .svg file.', true);
          return;
        }

        try {
          const content = await file.text();
          const parsed = new DOMParser().parseFromString(content, 'image/svg+xml');
          if (
            !parsed.documentElement ||
            parsed.documentElement.nodeName.toLowerCase() !== 'svg' ||
            parsed.querySelector('parsererror')
          ) {
            throw new Error('Invalid SVG');
          }
          const sanitizedContent = sanitizeSvg(parsed);

          revokeCurrentUrl();
          currentUrl = URL.createObjectURL(new Blob([sanitizedContent], { type: 'image/svg+xml' }));
          image.data = currentUrl;
          image.hidden = false;
          placeholder.hidden = true;
          setStatus(`Loaded: ${file.name}`);
        } catch (error) {
          console.error(error);
          revokeCurrentUrl();
          clearImage();
          setStatus('Could not read this SVG file.', true);
        }
      });

      window.addEventListener('beforeunload', revokeCurrentUrl);
    </script>
  </body>
</html>
