<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Map Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4efe1;
        color: #201f1c;
        overflow: hidden;
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        height: 3rem;
        background: #fffaf0;
        border-bottom: 1px solid #c8c0b0;
        flex-shrink: 0;
        position: relative;
        z-index: 100;
      }

      .topbar-title {
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.01em;
      }

      /* Hamburger button */
      .menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 2.2rem;
        height: 2.2rem;
        padding: 0.35rem;
        border: 1px solid #201f1c;
        border-radius: 0.4rem;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
      }

      .menu-btn:hover {
        background: #fef6dd;
      }

      .menu-btn span {
        display: block;
        height: 2px;
        background: #201f1c;
        border-radius: 2px;
      }

      /* Dropdown menu */
      .menu-dropdown {
        display: none;
        position: absolute;
        top: calc(3rem + 2px);
        right: 1rem;
        background: #fffaf0;
        border: 1px solid #c8c0b0;
        border-radius: 0.5rem;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        padding: 0.5rem;
        min-width: 14rem;
        z-index: 200;
      }

      .menu-dropdown.open {
        display: block;
      }

      .menu-item-upload {
        padding: 0.3rem 0.5rem;
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.55rem 0.75rem;
        border-radius: 0.35rem;
        font-size: 0.95rem;
        cursor: pointer;
      }

      .menu-item:hover {
        background: #fef6dd;
      }

      .upload {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 0.9rem;
        border: 1px solid #201f1c;
        border-radius: 0.4rem;
        background: #fffaf0;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        width: 100%;
      }

      .upload:hover {
        background: #fef6dd;
      }

      input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .menu-status {
        margin: 0.35rem 0.75rem 0.2rem;
        font-size: 0.85rem;
        color: #6c675c;
        word-break: break-all;
      }

      .menu-status.error {
        color: #b00020;
      }

      /* ── Map area ── */
      .map-frame {
        flex: 1 1 0;
        background: #ece5d4;
        display: grid;
        place-items: center;
        overflow: auto;
      }

      #map-image {
        max-width: 100%;
        max-height: 100%;
        display: block;
      }

      .placeholder {
        color: #6c675c;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="topbar-title">SVG Map Viewer</span>
      <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="menu-dropdown">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="menu-dropdown" id="menu-dropdown" role="menu">
        <div class="menu-item menu-item-upload">
          <label class="upload" for="svg-upload">Upload SVG Map</label>
          <input id="svg-upload" type="file" accept=".svg,image/svg+xml" />
        </div>
        <p id="status" class="menu-status">Choose an SVG file to render the map.</p>
      </div>
    </header>

    <section class="map-frame" aria-live="polite">
      <p id="placeholder" class="placeholder">No map loaded yet.</p>
      <object id="map-image" type="image/svg+xml" aria-label="Uploaded SVG map" hidden>Your browser does not support SVG maps.</object>
    </section>

    <script>
      const input = document.getElementById('svg-upload');
      const status = document.getElementById('status');
      const image = document.getElementById('map-image');
      const placeholder = document.getElementById('placeholder');
      const menuBtn = document.getElementById('menu-btn');
      const menuDropdown = document.getElementById('menu-dropdown');
      let currentUrl = '';

      // Hamburger toggle
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = menuDropdown.classList.toggle('open');
        menuBtn.setAttribute('aria-expanded', String(isOpen));
        menuBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
      });

      document.addEventListener('click', (e) => {
        if (!menuDropdown.contains(e.target) && !menuBtn.contains(e.target)) {
          menuDropdown.classList.remove('open');
          menuBtn.setAttribute('aria-expanded', 'false');
        }
      });

      const setStatus = (message, isError = false) => {
        status.textContent = message;
        status.classList.toggle('error', isError);
      };

      const revokeCurrentUrl = () => {
        if (currentUrl) {
          URL.revokeObjectURL(currentUrl);
          currentUrl = '';
        }
      };

      const clearImage = () => {
        image.removeAttribute('data');
        image.hidden = true;
        placeholder.hidden = false;
      };

      const sanitizeSvg = (svgDocument) => {
        const MAX_ARTIFACT_GEOMETRY_LENGTH = 48;
        const MAX_ARTIFACT_STROKE_WIDTH = 2.25;
        const MAX_NEAR_BLACK_CHANNEL_VALUE = 40;

        const isNearBlack = (value) => {
          if (!value) {
            return false;
          }
          const color = value.trim().toLowerCase();
          if (
            color === 'black' ||
            color === '#000' ||
            color === '#000000' ||
            color === 'rgb(0,0,0)' ||
            color === 'rgb(0, 0, 0)'
          ) {
            return true;
          }

          const hexMatch = color.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/);
          if (hexMatch) {
            const hex = hexMatch[1];
            const parseHex = (hexValue) => Number.parseInt(hexValue, 16);
            const channels =
              hex.length === 3
                ? hex.split('').map((hexChar) => parseHex(hexChar.repeat(2)))
                : [hex.slice(0, 2), hex.slice(2, 4), hex.slice(4, 6)].map((channelHex) => parseHex(channelHex));
            return channels.every(
              (channel) => Number.isFinite(channel) && channel <= MAX_NEAR_BLACK_CHANNEL_VALUE
            );
          }

          const rgbMatch = color.match(/^rgba?\s*\(([^)]+)\)$/);
          if (!rgbMatch) {
            return false;
          }
          const channels = rgbMatch[1]
            .split(',')
            .slice(0, 3)
            .map((part) => Number.parseFloat(part.trim()));
          return (
            channels.length === 3 &&
            channels.every(
              (channel) => Number.isFinite(channel) && channel <= MAX_NEAR_BLACK_CHANNEL_VALUE
            )
          );
        };

        const getStylePropertyValue = (style, propertyName) => {
          const match = style.match(new RegExp(`(?:^|;)\\s*${propertyName}\\s*:\\s*([^;]+)`, 'i'));
          return match ? match[1].trim() : '';
        };

        const getPresentationValue = (node, propertyName) => {
          let currentNode = node;
          while (currentNode && currentNode.nodeType === 1) {
            const value = currentNode.getAttribute(propertyName);
            if (value && value.trim()) {
              return value.trim();
            }
            const style = currentNode.getAttribute('style');
            if (style) {
              const styleValue = getStylePropertyValue(style, propertyName);
              if (styleValue) {
                return styleValue;
              }
            }
            currentNode = currentNode.parentElement;
          }
          return '';
        };

        const getGeometryLength = (node) => {
          if (typeof node.getTotalLength === 'function') {
            try {
              const length = node.getTotalLength();
              if (Number.isFinite(length)) {
                return length;
              }
            } catch (error) {
              // Fall through to tag-specific fallback below.
            }
          }

          const tagName = node.tagName?.toLowerCase();
          if (tagName === 'polyline') {
            const points = (node.getAttribute('points') ?? '').trim();
            if (!points) {
              return Number.NaN;
            }

            const parsedPoints = points
              .split(/[\s,]+/)
              .map((value) => Number.parseFloat(value))
              .filter((value) => Number.isFinite(value));
            if (parsedPoints.length < 4 || parsedPoints.length % 2 !== 0) {
              return Number.NaN;
            }

            let totalLength = 0;
            for (let i = 2; i < parsedPoints.length; i += 2) {
              const prevX = parsedPoints[i - 2];
              const prevY = parsedPoints[i - 1];
              const x = parsedPoints[i];
              const y = parsedPoints[i + 1];
              totalLength += Math.hypot(x - prevX, y - prevY);
            }
            return totalLength;
          }

          if (tagName !== 'line') {
            return Number.NaN;
          }

          const x1 = Number.parseFloat(node.getAttribute('x1') ?? '0');
          const y1 = Number.parseFloat(node.getAttribute('y1') ?? '0');
          const x2 = Number.parseFloat(node.getAttribute('x2') ?? '0');
          const y2 = Number.parseFloat(node.getAttribute('y2') ?? '0');
          if (![x1, y1, x2, y2].every(Number.isFinite)) {
            return Number.NaN;
          }
          return Math.hypot(x2 - x1, y2 - y1);
        };

        const isArtifactLine = (stroke, strokeWidth, length) =>
          isNearBlack(stroke) &&
          Number.isFinite(strokeWidth) &&
          strokeWidth > 0 &&
          strokeWidth <= MAX_ARTIFACT_STROKE_WIDTH &&
          Number.isFinite(length) &&
          length > 0 &&
          length <= MAX_ARTIFACT_GEOMETRY_LENGTH;

        svgDocument.querySelectorAll('script, foreignObject').forEach((node) => node.remove());
        svgDocument.querySelectorAll('*').forEach((node) => {
          [...node.attributes].forEach((attribute) => {
            const name = attribute.name.toLowerCase();
            const value = attribute.value.toLowerCase().trim();
            if (name.startsWith('on') || value.startsWith('javascript:')) {
              node.removeAttribute(attribute.name);
            }
          });
        });

        svgDocument.querySelectorAll('line, polyline, path').forEach((node) => {
          const stroke = getPresentationValue(node, 'stroke');
          const strokeWidth = Number.parseFloat(getPresentationValue(node, 'stroke-width'));
          const length = getGeometryLength(node);
          if (isArtifactLine(stroke, strokeWidth, length)) {
            node.remove();
          }
        });

        return new XMLSerializer().serializeToString(svgDocument);
      };

      input.addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
          return;
        }

        const appearsToBeSvg =
          file.name.toLowerCase().endsWith('.svg') || file.type === 'image/svg+xml';
        if (!appearsToBeSvg) {
          setStatus('Please select a valid .svg file.', true);
          return;
        }

        try {
          const content = await file.text();
          const parsed = new DOMParser().parseFromString(content, 'image/svg+xml');
          if (
            !parsed.documentElement ||
            parsed.documentElement.nodeName.toLowerCase() !== 'svg' ||
            parsed.querySelector('parsererror')
          ) {
            throw new Error('Invalid SVG');
          }
          const sanitizedContent = sanitizeSvg(parsed);

          revokeCurrentUrl();
          currentUrl = URL.createObjectURL(new Blob([sanitizedContent], { type: 'image/svg+xml' }));
          image.data = currentUrl;
          image.hidden = false;
          placeholder.hidden = true;
          setStatus(`Loaded: ${file.name}`);
        } catch (error) {
          console.error(error);
          revokeCurrentUrl();
          clearImage();
          setStatus('Could not read this SVG file.', true);
        }
      });

      window.addEventListener('beforeunload', revokeCurrentUrl);
    </script>
  </body>
</html>
